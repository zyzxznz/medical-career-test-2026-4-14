<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个性化转型分析报告 - 医护职业转型测试系统</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 个性化报告专用样式 - 浅蓝色主题 */
        :root {
            --report-primary: #2c5282;
            --report-light: #e6f2ff;
            --report-lighter: #f0f7ff;
            --report-accent: #3182ce;
            --report-accent-light: #bee3f8;
            --report-green: #38a169;
            --report-green-light: #e6fffa;
            --report-orange: #dd6b20;
            --report-orange-light: #fffaf0;
            --report-red: #e53e3e;
            --report-border: #cbd5e0;
        }

        body {
            background: linear-gradient(135deg, #e6f2ff 0%, #f0f7ff 50%, #e6fffa 100%);
            min-height: 100vh;
        }

        .report-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 报告头部 */
        .report-header {
            background: linear-gradient(135deg, #2c5282 0%, #3182ce 100%);
            color: white;
            padding: 2.5rem 2rem;
            border-radius: 16px 16px 0 0;
            text-align: center;
            box-shadow: 0 8px 30px rgba(44, 82, 130, 0.2);
        }

        .report-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        .report-header h1 {
            margin: 0 0 0.5rem 0;
            font-size: 2rem;
            font-weight: 700;
        }

        .report-subtitle {
            opacity: 0.9;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .report-meta {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.15);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .meta-item i {
            color: #bee3f8;
        }

        /* 报告导航 */
        .report-navigation {
            display: flex;
            background: white;
            border-radius: 0 0 12px 12px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 15px rgba(44, 82, 130, 0.08);
            overflow: hidden;
        }

        .nav-btn {
            flex: 1;
            min-width: 100px;
            padding: 1rem 0.8rem;
            border: none;
            background: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            color: #4a5568;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            border-bottom: 3px solid transparent;
        }

        .nav-btn:hover {
            background: #f0f7ff;
            color: #2c5282;
        }

        .nav-btn.active {
            color: #2c5282;
            border-bottom-color: #3182ce;
            background: #f0f7ff;
            font-weight: 600;
        }

        .nav-btn i {
            font-size: 1.2rem;
        }

        /* 报告部分 */
        .report-section {
            display: none;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 15px rgba(44, 82, 130, 0.08);
            animation: fadeIn 0.5s ease;
        }

        .report-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .report-section h3 {
            color: #2c5282;
            margin-bottom: 1.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid #bee3f8;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.4rem;
        }

        .report-section h3 i {
            color: #3182ce;
        }

        .report-section h4 {
            color: #2c5282;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
        }

        /* 执行摘要 */
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1.5rem;
        }

        .summary-card {
            background: #f0f7ff;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #bee3f8;
            text-align: center;
        }

        .summary-card h4 {
            text-align: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .readiness-circle {
            width: 130px;
            height: 130px;
            margin: 0 auto 1rem;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: conic-gradient(#3182ce 0%, #bee3f8 0%);
        }

        .readiness-circle::before {
            content: '';
            position: absolute;
            width: 110px;
            height: 110px;
            background: white;
            border-radius: 50%;
        }

        .readiness-circle .score-value {
            position: relative;
            z-index: 1;
            font-size: 2.2rem;
            font-weight: 700;
            color: #2c5282;
        }

        .readiness-circle .score-label {
            position: relative;
            z-index: 1;
            font-size: 0.75rem;
            color: #4a5568;
            margin-top: 2px;
        }

        .summary-card .score-description {
            color: #4a5568;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .primary-direction {
            padding: 0.5rem;
        }

        .primary-direction h5 {
            font-size: 1.6rem;
            color: #2c5282;
            margin: 0.3rem 0;
        }

        .match-badge {
            display: inline-block;
            background: #3182ce;
            color: white;
            padding: 0.3rem 1.2rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin: 0.5rem 0;
        }

        .core-traits-list {
            text-align: left;
            padding-left: 0;
            list-style: none;
        }

        .core-traits-list li {
            padding: 0.4rem 0;
            color: #4a5568;
            font-size: 0.9rem;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .core-traits-list li::before {
            content: '✦';
            color: #3182ce;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        /* 用户画像 */
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .profile-card {
            padding: 1.5rem;
            border-radius: 12px;
        }

        .profile-card h4 {
            margin-bottom: 1rem;
        }

        .profile-card ul {
            list-style: none;
            padding: 0;
        }

        .profile-card ul li {
            padding: 0.5rem 0;
            font-size: 0.95rem;
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
        }

        .profile-description {
            grid-column: 1 / -1;
            background: #f0f7ff;
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid #3182ce;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #4a5568;
        }

        .profile-strengths {
            background: #e6fffa;
            border: 1px solid #81e6d9;
        }

        .profile-strengths h4 i { color: #38a169; }
        .profile-strengths ul li::before { content: '✓'; color: #38a169; font-weight: bold; margin-right: 0.3rem; }

        .profile-areas {
            background: #fffaf0;
            border: 1px solid #fbd38d;
        }

        .profile-areas h4 i { color: #dd6b20; }
        .profile-areas ul li::before { content: '▲'; color: #dd6b20; font-weight: bold; margin-right: 0.3rem; }

        .profile-core {
            background: #e6f2ff;
            border: 1px solid #bee3f8;
        }

        .profile-core h4 i { color: #3182ce; }
        .profile-core ul li::before { content: '◆'; color: #3182ce; margin-right: 0.3rem; }

        /* 方向分析 */
        .direction-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
        }

        .direction-tab {
            padding: 0.7rem 1.5rem;
            border: 2px solid #bee3f8;
            background: white;
            border-radius: 30px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            color: #4a5568;
        }

        .direction-tab:hover {
            border-color: #3182ce;
            color: #2c5282;
        }

        .direction-tab.active {
            background: #3182ce;
            color: white;
            border-color: #3182ce;
        }

        .direction-content {
            background: #f0f7ff;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #bee3f8;
        }

        .direction-detail {
            display: none;
        }

        .direction-detail.active {
            display: block;
        }

        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        .analysis-card {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(44, 82, 130, 0.06);
        }

        .analysis-card h5 {
            color: #2c5282;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .analysis-card ul {
            list-style: none;
            padding: 0;
        }

        .analysis-card ul li {
            padding: 0.4rem 0;
            font-size: 0.9rem;
            color: #4a5568;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .analysis-card ul li::before {
            content: '•';
            color: #3182ce;
            font-weight: bold;
        }

        .direction-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .direction-header h4 {
            margin: 0;
        }

        .direction-score-badge {
            background: #3182ce;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .positions-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .position-tag {
            background: #bee3f8;
            color: #2c5282;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.85rem;
        }

        /* 报告操作按钮 */
        .report-actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #bee3f8;
        }

        .loading-message {
            text-align: center;
            padding: 3rem;
            color: #4a5568;
        }

        .loading-message i {
            font-size: 3rem;
            color: #3182ce;
            margin-bottom: 1rem;
        }

        .no-data-message {
            text-align: center;
            padding: 4rem 2rem;
            color: #4a5568;
        }

        .no-data-message i {
            font-size: 4rem;
            color: #bee3f8;
            margin-bottom: 1.5rem;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .summary-grid {
                grid-template-columns: 1fr;
            }
            
            .profile-grid {
                grid-template-columns: 1fr;
            }
            
            .analysis-grid {
                grid-template-columns: 1fr;
            }
            
            .report-navigation {
                flex-wrap: wrap;
            }
            
            .nav-btn {
                min-width: 80px;
                padding: 0.8rem 0.5rem;
                font-size: 0.8rem;
            }
            
            .report-meta {
                flex-direction: column;
                align-items: center;
                gap: 0.8rem;
            }
            
            .report-header h1 {
                font-size: 1.5rem;
            }
            
            .report-actions {
                flex-direction: column;
                align-items: center;
            }
            
            .direction-tabs {
                justify-content: center;
            }
        }

        @media print {
            .report-navigation, .report-actions {
                display: none;
            }
            
            .report-section {
                display: block !important;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div class="report-container">
        <!-- 报告头部 -->
        <div class="report-header">
            <div class="report-icon">
                <i class="fas fa-file-medical-alt"></i>
            </div>
            <h1>个性化职业转型分析报告</h1>
            <p class="report-subtitle">基于专业背景和能力评估的深度分析</p>
            <div class="report-meta">
                <span class="meta-item">
                    <i class="fas fa-user-md"></i>
                    <span id="user-role-display">--</span>
                </span>
                <span class="meta-item">
                    <i class="fas fa-calendar-alt"></i>
                    <span id="user-experience-display">--</span>
                </span>
                <span class="meta-item">
                    <i class="fas fa-graduation-cap"></i>
                    <span id="user-education-display">--</span>
                </span>
                <span class="meta-item">
                    <i class="fas fa-clinic-medical"></i>
                    <span id="user-specialty-display">--</span>
                </span>
            </div>
        </div>
        
        <!-- 报告导航 -->
        <div class="report-navigation">
            <button class="nav-btn active" data-section="executive-summary">
                <i class="fas fa-list-alt"></i>
                <span>执行摘要</span>
            </button>
            <button class="nav-btn" data-section="user-profile">
                <i class="fas fa-user-circle"></i>
                <span>用户画像</span>
            </button>
            <button class="nav-btn" data-section="direction-analysis">
                <i class="fas fa-compass"></i>
                <span>方向分析</span>
            </button>
        </div>
        
        <!-- 报告内容 -->
        <div class="report-content">
            <!-- 加载中 / 无数据 -->
            <div id="loading-section" class="report-section active">
                <div class="loading-message">
                    <i class="fas fa-spinner fa-pulse"></i>
                    <p>正在加载您的个性化报告...</p>
                </div>
            </div>
            <div id="no-data-section" class="report-section">
                <div class="no-data-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <h3>未找到测试数据</h3>
                    <p>请先完成能力评估测试，获取您的个性化报告。</p>
                    <button class="btn-primary" onclick="goBackToTest()">
                        <i class="fas fa-arrow-left"></i> 返回测试
                    </button>
                </div>
            </div>

            <!-- 执行摘要部分 -->
            <section id="executive-summary" class="report-section">
                <h3><i class="fas fa-file-contract"></i> 执行摘要</h3>
                <div class="summary-grid">
                    <div class="summary-card">
                        <h4><i class="fas fa-chart-pie"></i> 总体转型准备度</h4>
                        <div class="readiness-circle" id="readiness-circle">
                            <div class="score-value" id="readiness-score">--</div>
                            <div class="score-label">准备度</div>
                        </div>
                        <p class="score-description" id="readiness-desc">基于综合评估计算</p>
                        <div style="margin-top: 0.5rem;">
                            <span class="match-badge" id="readiness-badge" style="font-size:0.8rem; padding:0.2rem 0.8rem;">--</span>
                        </div>
                    </div>
                    
                    <div class="summary-card">
                        <h4><i class="fas fa-star"></i> 首选转型方向</h4>
                        <div class="primary-direction">
                            <h5 id="primary-direction-name">--</h5>
                            <div class="match-badge" id="primary-direction-badge">--</div>
                            <p style="margin-top:0.8rem; color:#4a5568; font-size:0.9rem;">
                                <strong>报告类型：</strong><span id="report-type-name">--</span>
                            </p>
                            <p style="color:#4a5568; font-size:0.85rem;">
                                <strong>核心优势：</strong><span id="dominant-ability-name">--</span>
                            </p>
                        </div>
                    </div>
                    
                    <div class="summary-card">
                        <h4><i class="fas fa-list-ul"></i> 核心特征摘要</h4>
                        <ul class="core-traits-list" id="core-traits-summary">
                            <li>加载中...</li>
                        </ul>
                    </div>
                </div>
            </section>
            
            <!-- 用户画像部分 -->
            <section id="user-profile" class="report-section">
                <h3><i class="fas fa-user-circle"></i> 用户画像分析</h3>
                <div class="profile-grid">
                    <div class="profile-card profile-description" id="profile-description-card">
                        <p id="profile-description-text">加载中...</p>
                    </div>
                    
                    <div class="profile-card profile-core">
                        <h4><i class="fas fa-gem"></i> 核心特征</h4>
                        <ul id="core-traits-list">
                            <li>加载中...</li>
                        </ul>
                    </div>
                    
                    <div class="profile-card profile-strengths">
                        <h4><i class="fas fa-star"></i> 专业优势</h4>
                        <ul id="strengths-list">
                            <li>加载中...</li>
                        </ul>
                    </div>
                    
                    <div class="profile-card profile-areas">
                        <h4><i class="fas fa-chart-line"></i> 发展领域</h4>
                        <ul id="development-areas-list">
                            <li>加载中...</li>
                        </ul>
                    </div>
                </div>
            </section>
            
            <!-- 方向分析部分 -->
            <section id="direction-analysis" class="report-section">
                <h3><i class="fas fa-compass"></i> 转型方向匹配分析</h3>
                
                <div class="direction-tabs" id="direction-tabs">
                    <!-- 由JS动态生成 -->
                </div>
                
                <div class="direction-content" id="direction-content">
                    <!-- 由JS动态生成 -->
                </div>
            </section>
        </div>
        
        <!-- 报告操作 -->
        <div class="report-actions">
            <button class="btn-primary" onclick="goBackToTest()">
                <i class="fas fa-arrow-left"></i> 返回测试
            </button>
            <button class="btn-secondary" onclick="window.print()">
                <i class="fas fa-print"></i> 打印报告
            </button>
        </div>
    </div>
    
    <script src="js/personalized-report-data.js"></script>
    <script src="js/personalized-report.js"></script>
    <script>
        // 用户信息映射
        const roleNameMap = {
            'doctor': '医生',
            'nurse': '护士',
            'pharmacist': '药剂师',
            'technician': '医技人员',
            'administrator': '医疗管理人员',
            'other': '其他'
        };

        const experienceNameMap = {
            '0-3': '0-3年',
            '3-5': '3-5年',
            '5-10': '5-10年',
            '10-15': '10-15年',
            '15+': '15年以上'
        };

        const educationNameMap = {
            'bachelor': '本科',
            'master': '硕士',
            'doctor': '博士',
            'other': '其他'
        };

        // 初始化报告页面
        function initReport() {
            // 尝试从localStorage读取数据
            let testResults = null;
            try {
                const storedData = localStorage.getItem('careerTestResults');
                if (storedData) {
                    testResults = JSON.parse(storedData);
                    console.log('成功读取测试数据:', testResults);
                }
            } catch (error) {
                console.error('读取localStorage数据失败:', error);
            }
            
            // 如果没有localStorage数据，尝试从URL参数获取
            if (!testResults) {
                const urlParams = new URLSearchParams(window.location.search);
                const dataParam = urlParams.get('data');
                if (dataParam) {
                    try {
                        testResults = JSON.parse(decodeURIComponent(dataParam));
                        console.log('从URL参数读取数据:', testResults);
                    } catch (e) {
                        console.error('解析URL参数失败:', e);
                    }
                }
            }
            
            if (!testResults) {
                console.log('未找到测试数据');
                document.getElementById('loading-section').classList.remove('active');
                document.getElementById('no-data-section').classList.add('active');
                return;
            }
            
            // 隐藏加载提示
            document.getElementById('loading-section').classList.remove('active');
            
            // 显示用户信息
            const userInfo = testResults.userInfo || {};
            const roleKey = userInfo.currentRole || '';
            const expKey = userInfo.experience || '';
            const eduKey = userInfo.education || '';
            
            document.getElementById('user-role-display').textContent = roleNameMap[roleKey] || roleKey || '--';
            document.getElementById('user-experience-display').textContent = experienceNameMap[expKey] || expKey || '--';
            document.getElementById('user-education-display').textContent = educationNameMap[eduKey] || eduKey || '--';
            document.getElementById('user-specialty-display').textContent = userInfo.specialty || '--';
            
            // 获取能力得分
            const scores = testResults.scores || {};
            const abilityScores = scores.abilityScores || {};
            
            // 生成报告数据
            const reportData = generateReportData(abilityScores, userInfo);
            
            // 渲染报告
            renderReport(reportData, userInfo);
            
            // 更新页面标题
            const reportType = reportData.matchResult.report ? reportData.matchResult.report.name : '';
            document.title = `${reportType}个性化报告 - 医护职业转型测试系统`;
        }
        
        // 渲染报告内容
        function renderReport(reportData, userInfo) {
            const exe = reportData.executiveSummary;
            const profile = reportData.userProfile;
            const directions = reportData.directionAnalysis;
            
            // ---- 执行摘要 ----
            // 准备度分数圆圈
            const readinessVal = exe.readiness;
            const circle = document.getElementById('readiness-circle');
            circle.style.background = `conic-gradient(#3182ce ${readinessVal}%, #bee3f8 ${readinessVal}%)`;
            document.getElementById('readiness-score').textContent = readinessVal + '%';
            document.getElementById('readiness-desc').textContent = '基于综合评估计算';
            document.getElementById('readiness-badge').textContent = exe.readinessLevel;
            
            // 首选方向
            document.getElementById('primary-direction-name').textContent = exe.topDirection;
            document.getElementById('primary-direction-badge').textContent = exe.topDirectionScore + '% 匹配';
            document.getElementById('report-type-name').textContent = exe.reportName || '--';
            document.getElementById('dominant-ability-name').textContent = exe.dominantAbility || '--';
            
            // 核心特征摘要
            const traitsSummary = document.getElementById('core-traits-summary');
            traitsSummary.innerHTML = '';
            exe.coreTraitsSummary.forEach(trait => {
                const li = document.createElement('li');
                li.textContent = trait;
                traitsSummary.appendChild(li);
            });
            
            // 显示执行摘要
            document.getElementById('executive-summary').classList.add('active');
            
            // ---- 用户画像 ----
            document.getElementById('profile-description-text').textContent = profile.description || '暂无描述';
            
            // 核心特征
            const coreTraitsList = document.getElementById('core-traits-list');
            coreTraitsList.innerHTML = '';
            profile.coreTraits.forEach(trait => {
                const li = document.createElement('li');
                li.textContent = trait;
                coreTraitsList.appendChild(li);
            });
            
            // 专业优势
            const strengthsList = document.getElementById('strengths-list');
            strengthsList.innerHTML = '';
            profile.strengths.forEach(str => {
                const li = document.createElement('li');
                li.textContent = str;
                strengthsList.appendChild(li);
            });
            
            // 发展领域
            const areasList = document.getElementById('development-areas-list');
            areasList.innerHTML = '';
            profile.developmentAreas.forEach(area => {
                const li = document.createElement('li');
                li.textContent = area;
                areasList.appendChild(li);
            });
            
            // ---- 方向分析 ----
            renderDirectionAnalysis(directions);
        }
        
        // 渲染方向分析
        function renderDirectionAnalysis(directions) {
            const tabsContainer = document.getElementById('direction-tabs');
            const contentContainer = document.getElementById('direction-content');
            
            tabsContainer.innerHTML = '';
            contentContainer.innerHTML = '';
            
            directions.forEach((dir, index) => {
                // 创建选项卡
                const tab = document.createElement('button');
                tab.className = `direction-tab ${index === 0 ? 'active' : ''}`;
                tab.textContent = dir.rank + '. ' + dir.name + ' (' + dir.matchScore + '%)';
                tab.dataset.direction = dir.name;
                
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.direction-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelectorAll('.direction-detail').forEach(d => d.classList.remove('active'));
                    const target = document.getElementById('direction-detail-' + index);
                    if (target) target.classList.add('active');
                });
                
                tabsContainer.appendChild(tab);
                
                // 创建内容
                const content = document.createElement('div');
                content.id = 'direction-detail-' + index;
                content.className = 'direction-detail ' + (index === 0 ? 'active' : '');
                
                const rankLabel = index === 0 ? '首选推荐' : (index === 1 ? '次选推荐' : '第三推荐');
                
                let strengthsHtml = '';
                if (dir.strengths && dir.strengths.length > 0) {
                    strengthsHtml = '<ul>';
                    dir.strengths.forEach(s => { strengthsHtml += '<li>' + s + '</li>'; });
                    strengthsHtml += '</ul>';
                }
                
                let positionsHtml = '';
                if (dir.positions && dir.positions.length > 0) {
                    positionsHtml = '<div class="positions-tags">';
                    dir.positions.forEach(p => { positionsHtml += '<span class="position-tag">' + p + '</span>'; });
                    positionsHtml += '</div>';
                }
                
                content.innerHTML = `
                    <div class="direction-header">
                        <h4>${rankLabel}：${dir.name}</h4>
                        <span class="direction-score-badge">${dir.matchScore}% 匹配 · ${dir.matchLevel}</span>
                    </div>
                    <div class="analysis-grid">
                        <div class="analysis-card">
                            <h5><i class="fas fa-check-circle" style="color: #38a169"></i> 优势分析</h5>
                            ${strengthsHtml || '<p style="color:#4a5568; font-size:0.9rem;">暂无数据</p>'}
                        </div>
                        <div class="analysis-card">
                            <h5><i class="fas fa-briefcase" style="color: #3182ce"></i> 推荐岗位</h5>
                            ${positionsHtml || '<p style="color:#4a5568; font-size:0.9rem;">暂无数据</p>'}
                        </div>
                    </div>
                    <div class="analysis-card" style="margin-top:1rem;">
                        <h5 style="justify-content:center;">
                            <i class="fas fa-tachometer-alt" style="color:#3182ce"></i> 
                            匹配评分：${dir.matchScore}% 
                            <span style="font-weight:400; font-size:0.9rem; color:#4a5568;">（${dir.matchLevel}）</span>
                        </h5>
                    </div>
                `;
                
                contentContainer.appendChild(content);
            });
        }
        
        // 返回测试
        function goBackToTest() {
            window.location.href = 'index.html';
        }
        
        // 报告导航切换
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.report-section').forEach(s => s.classList.remove('active'));
                
                this.classList.add('active');
                const sectionId = this.getAttribute('data-section');
                document.getElementById(sectionId).classList.add('active');
            });
        });
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initReport();
        });
    </script>
</body>
</html>
