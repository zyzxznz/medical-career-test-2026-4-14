        // 步骤管理
        function updateSteps() {
            // 更新步骤指示器
            for (let i = 1; i <= 4; i++) {
                const step = document.getElementById(`step-${i}`);
                if (i < appState.currentStep) {
                    step.classList.add('completed');
                    step.classList.remove('active');
                } else if (i === appState.currentStep) {
                    step.classList.add('active');
                    step.classList.remove('completed');
                } else {
                    step.classList.remove('active', 'completed');
                }
            }
            
            // 显示对应的卡片
            const cards = ['welcome-card', 'info-card', 'assessment-card', 'result-card'];
            cards.forEach((cardId, index) => {
                const card = document.getElementById(cardId);
                if (index + 1 === appState.currentStep) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            });
        }
        
        // 下一步
        function nextStep() {
            if (appState.currentStep < 4) {
                appState.currentStep++;
                updateSteps();
                
                // 如果是评估页面，显示第一个问题
                if (appState.currentStep === 3) {
                    showQuestion(0);
                }
            }
        }

        function prevStep() {
            if (appState.currentStep > 1) {
                appState.currentStep--;
                updateSteps();

            // 验证表单

                alert('请填写所有必填字段');
                return false;
            }
            
            // 进入下一步
            nextStep();
            return false;
        }
        
        // 显示问题
        function showQuestion(index) {
            appState.currentQuestion = index;
            const question = appState.questions[index];
            
            // 更新问题编号和进度
            document.getElementById('current-question-num').textContent = `问题 ${index + 1}`;
            document.getElementById('progress-text').textContent = `${index + 1}/${appState.questions.length}`;
            document.getElementById('question-text').textContent = question.text;
            
            // 生成选项
            let optionsHtml = '';
            question.options.forEach((option, optionIndex) => {
                const isSelected = appState.answers[index] === optionIndex;
                optionsHtml += `
                    <div class="option-item ${isSelected ? 'selected' : ''}" onclick="selectAnswer(${index}, ${optionIndex})">
                        <div class="option-radio"></div>
                        <div class="option-text">${option}</div>
                    </div>
                `;
            });
            
            document.getElementById('options-container').innerHTML = optionsHtml;
            
            // 更新按钮状态
            updateQuestionButtons();
        }
        
        // 选择答案
        function selectAnswer(questionIndex, answerIndex) {
            appState.answers[questionIndex] = answerIndex;
            showQuestion(questionIndex);
            
            // 启用下一题按钮
            document.getElementById('next-question').disabled = false;
        }
        
        // 更新问题按钮状态
        function updateQuestionButtons() {
            const prevBtn = document.getElementById('prev-question');
            const nextBtn = document.getElementById('next-question');
            const submitBtn = document.getElementById('submit-assessment');
            
            // 上一题按钮
            prevBtn.disabled = appState.currentQuestion === 0;
            
            // 下一题按钮
            nextBtn.disabled = appState.answers[appState.currentQuestion] === undefined;
            
            // 提交按钮（最后一题显示）
            const isLastQuestion = appState.currentQuestion === appState.questions.length - 1;
            submitBtn.style.display = isLastQuestion ? 'inline-flex' : 'none';
            nextBtn.style.display = isLastQuestion ? 'none' : 'inline-flex';
        }
        
        // 上一题
        function prevQuestion() {
            if (appState.currentQuestion > 0) {
                showQuestion(appState.currentQuestion - 1);
            }
        }
        
        // 下一题
        function nextQuestion() {
            if (appState.answers[appState.currentQuestion] === undefined) {
                alert('请先选择当前问题的答案');
                return;
            }
            
            if (appState.currentQuestion < appState.questions.length - 1) {
                showQuestion(appState.currentQuestion + 1);
            } else {
                submitAssessment();
            }
        }
        
        // 提交评估
        function submitAssessment() {
            // 检查是否所有问题已回答
            let allAnswered = true;
            for (let i = 0; i < appState.questions.length; i++) {
                if (appState.answers[i] === undefined) {
                    allAnswered = false;
                    break;
                }
            }
            
            if (!allAnswered) {
                alert('请完成所有问题后再提交评估');
                return;
            }
            
            // 计算分数
            let totalScore = 0;
            appState.answers.forEach(answer => {
                if (answer !== undefined) {
                    totalScore += (4 - answer) + 1; // 反向计分：1-5分
                }
            });
            
            const maxScore = appState.questions.length * 5;
            const matchScore = Math.round((totalScore / maxScore) * 100);
            
            // 更新匹配度显示
            document.getElementById('match-score').textContent = `${matchScore}%`;
            
            // 生成推荐内容
            generateRecommendations(matchScore);

            nextStep();
